name: Release Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.2.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      QT_QPA_PLATFORM: offscreen

    steps:
    - uses: actions/checkout@v4

    - name: Validate version format
      shell: pwsh
      run: |
        if ("${{ inputs.version }}" -notmatch '^\d+\.\d+\.\d+$') {
          Write-Error "Invalid version format. Expected: X.Y.Z (e.g. 1.2.0)"
          exit 1
        }

    - name: Write VERSION file
      shell: pwsh
      run: |
        Set-Content -Path "VERSION" -Value "${{ inputs.version }}" -NoNewline

    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if (Test-Path requirements.txt) { pip install -r requirements.txt }
        pip install PyQt5-Qt5

    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Test Logic Only (Skip GUI)
      run: |
        pytest -p no:faulthandler -k "not integration and not gui" --ignore=tests/integration/test_gui_integration.py --ignore=tests/unit/test_gui_dialogs.py --ignore=tests/unit/test_gui_widgets.py --ignore=tests/unit/test_gui_threading.py --ignore=tests/unit/test_gui_main_window.py

    - name: Build with PyInstaller
      run: |
        pyinstaller --name "BudgetTracker_${{ inputs.version }}" --onefile --windowed --icon="badget_tracker.ico" --add-data "badget_tracker.ico;." --add-data "src/default_categories.json;src" --add-data "VERSION;." --hidden-import=pandas --hidden-import=openpyxl --hidden-import=matplotlib --hidden-import=matplotlib.backends.backend_qt5agg --hidden-import=PyQt5 --hidden-import=PyQt5.QtCore --hidden-import=PyQt5.QtGui --hidden-import=PyQt5.QtWidgets --exclude-module=tkinter --noconsole --clean main.py

    - name: Create Deployment Package
      run: |
        New-Item -ItemType Directory -Force -Path deployment
        Copy-Item "dist\BudgetTracker_${{ inputs.version }}.exe" -Destination "deployment\"
        if (Test-Path "badget_tracker.ico") { Copy-Item "badget_tracker.ico" -Destination "deployment\" }
        
        New-Item -ItemType Directory -Force -Path "deployment\UserFiles"
        New-Item -ItemType Directory -Force -Path "deployment\UserFiles\backups"
        New-Item -ItemType Directory -Force -Path "deployment\UserFiles\backups\archive"
        New-Item -ItemType Directory -Force -Path "deployment\UserFiles\backups\dashboard"
        New-Item -ItemType Directory -Force -Path "deployment\appdata"
        New-Item -ItemType Directory -Force -Path "deployment\appdata\pending"
        
        if (Test-Path "UserFiles\dashboard.xlsx") { Copy-Item "UserFiles\dashboard.xlsx" -Destination "deployment\UserFiles\" }
        Set-Content -Path "deployment\UserFiles\categories.json" -Value "{}"
        Copy-Item "VERSION" -Destination "deployment\"

    - name: Create Git Tag
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag -a "v${{ inputs.version }}" -m "Release v${{ inputs.version }}"
        git push origin "v${{ inputs.version }}"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ inputs.version }}
        name: Budget Tracker v${{ inputs.version }}
        generate_release_notes: true
        files: |
          deployment/BudgetTracker_${{ inputs.version }}.exe
